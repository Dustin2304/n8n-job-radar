# ============================================================
# Job Radar – Configuration
# ============================================================

# ------------------------------------
# Search profiles
# Each profile defines a thematic search lane.
# weight: Relevance weight used during scoring (0.0 – 1.0)
# keywords: Passed directly as search queries to Indeed/LinkedIn
# ------------------------------------
profiles:
  - name: "AI Engineering"
    weight: 1.0
    keywords:
      - "AI Engineer Python LLM"
      - "Machine Learning Engineer GenAI"
      - "Data Scientist NLP RAG"
      - "LLM Engineer"
      - "GenAI Entwickler"
      - "AI Agent Developer"

  - name: "IT Consulting"
    weight: 0.8
    keywords:
      - "IT Consultant AI"
      - "Technical Consultant Python"
      - "Digitalisierung Berater"
      - "IT Projektmanager AI"
      - "Digital Transformation"
      - "Enterprise Architect AI"

  - name: "Backend/Integration"
    weight: 0.7
    keywords:
      - "Backend Engineer Python AI"
      - "Integration Engineer API"
      - "Software Engineer Python"

# ------------------------------------
# Search locations
# radius_km: Search radius in km; 0 = exact location match (useful for Remote)
# ------------------------------------
locations:
  - city: "Karlsruhe"
    country: "Germany"
    radius_km: 50
    is_remote: false

  - city: "Germany"
    country: "Germany"
    radius_km: 0
    is_remote: true

# ------------------------------------
# Exclusion filters
# Results are discarded if title_keywords appear in the job title
# or if the detected seniority level is listed under levels
# ------------------------------------
exclude:
  title_keywords:
    - praktikum
    - internship
    - werkstudent
    - thesis
    - duales studium
    - ausbildung
    - trainee
  levels:
    - Internship

# ------------------------------------
# Scoring
# threshold: Minimum score (0–100) for a job to appear in the report
# watchlist_bonus: Extra points awarded when the company is on the watchlist
# ------------------------------------
scoring:
  threshold: 50
  watchlist_bonus: 10

