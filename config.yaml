locations:
  - city: "Karlsruhe"
    radius_km: 100
    country: "Germany"
  # Remote komplett entfernt

scoring:
  threshold_it: 50          # Kern-IT + Schnittstellen
  threshold_non_it: 60      # Vertrieb, Marketing, Logistik

profiles:
  # ─── PROFIL 1: Kern-IT & AI (Gewicht 1.0) ────────────────────────────────
  - name: "AI & Data Engineering"
    weight: 1.0
    keywords:
      - "AI Engineer"
      - "ML Engineer"
      - "Data Scientist"
      - "Data Engineer"
      - "LLM Engineer"
      - "GenAI Developer"
      - "Machine Learning"
      - "Deep Learning"
      - "NLP Engineer"
      - "Computer Vision"
      - "MLOps"
      - "Prompt Engineer"
      - "AI Developer"
      - "KI Entwickler"

  - name: "Software Development"
    weight: 1.0
    keywords:
      - "Software Developer"
      - "Software Engineer"
      - "Backend Developer"
      - "Backend Engineer"
      - "Fullstack Developer"
      - "Full Stack Engineer"
      - "Python Developer"
      - "TypeScript Developer"
      - "API Developer"
      - "Cloud Engineer"
      - "DevOps Engineer"
      - "Platform Engineer"
      - "Automatisierung Entwickler"
      - "RPA Developer"

  - name: "Data & Analytics"
    weight: 1.0
    keywords:
      - "Data Analyst"
      - "Business Intelligence"
      - "BI Developer"
      - "Analytics Engineer"
      - "Data Platform"
      - "Data Warehouse"
      - "Reporting Analyst"

  # ─── PROFIL 2: IT-Schnittstellen (Gewicht 1.0, gleiche Prio wie Kern-IT) ──
  - name: "IT Consulting & Business Interface"
    weight: 1.0
    keywords:
      - "IT Consultant"
      - "Digitalisierungsmanager"
      - "Digitalization Manager"
      - "Business Analyst IT"
      - "Prozessberater IT"
      - "ERP Consultant Junior"        # SAP/ERP nur Junior-Level
      - "SAP Junior"
      - "Implementation Consultant"
      - "Solution Architect Junior"
      - "IT Projektmanager Junior"

  - name: "IT & Produktion / IoT"
    weight: 1.0
    keywords:
      - "MES Entwickler"
      - "IoT Developer"
      - "Industrie 4.0"
      - "OT Engineer"
      - "Produktions IT"
      - "Manufacturing Engineer IT"
      - "Digital Factory"
      - "Smart Manufacturing"
      - "Automatisierungstechnik IT"

  - name: "IT & Supply Chain / Logistik"
    weight: 1.0
    keywords:
      - "Supply Chain IT"
      - "Logistik IT"
      - "Warehouse Management System"
      - "WMS Developer"
      - "ERP Logistik"
      - "Supply Chain Analyst"
      - "Demand Planning IT"

  - name: "IT & Finance / Controlling"
    weight: 1.0
    keywords:
      - "Finance IT"
      - "Controlling IT"
      - "Financial Analyst IT"
      - "Treasury IT"
      - "Accounting Software"
      - "FP&A Analyst"
      - "Revenue Operations"

  - name: "IT & Marketing / E-Commerce"
    weight: 1.0
    keywords:
      - "Marketing Technology"
      - "MarTech"
      - "E-Commerce Developer"
      - "Digital Marketing Analyst"
      - "Growth Engineer"
      - "CRM Developer"
      - "Marketing Automation"
      - "Web Analytics"

  # ─── PROFIL 3: Non-IT Fallback (Gewicht 0.6, Threshold ≥60) ─────────────
  - name: "Vertrieb & Business Development"
    weight: 0.6
    keywords:
      - "Sales Engineer"
      - "Technical Sales"
      - "Business Development"
      - "Account Manager Tech"
      - "Pre-Sales Consultant"
      - "Solution Sales"

  - name: "Marketing & Content"
    weight: 0.6
    keywords:
      - "Content Manager"
      - "Marketing Manager"
      - "Performance Marketing"
      - "Brand Manager"
      - "Product Marketing"

  - name: "Logistik & Operations"
    weight: 0.6
    keywords:
      - "Logistics Manager Junior"
      - "Operations Analyst"
      - "Supply Chain Manager"
      - "Procurement Analyst"

# Senior-Filter – wird im Scraper auf Titel angewendet
filters:
  exclude_title_keywords:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Head of"
    - "Director"
    - "VP "
    - "Chief"
    - "Staff Engineer"
    - "(Senior)"
    - "Sr."